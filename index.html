pg"},{"main":"风格分类","series":"现代","title":"莹白世界加莫兰迪绿","src":"https://cdn.jsdelivr.net/gh/weilunda0908-rgb/shan-designer-portfolio@gh-pages/assets/img/101.jpg"}];
    const placeholder = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4 3"%3E%3Crect width="4" height="3" fill="%2318181b"/%3E%3C/svg%3E';
    const state = { main: '', series: '' };
    const mainNav = document.getElementById('mainNav');
    const seriesTabs = document.getElementById('seriesTabs');
    const mainTitle = document.getElementById('mainTitle');
    const seriesTitle = document.getElementById('seriesTitle');
    const loadNote = document.getElementById('loadNote');
    const galleryGrid = document.getElementById('galleryGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const mains = [...new Set(portfolioItems.map(item => item.main))];
    const imageObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const img = entry.target;
        img.src = img.dataset.src;
        img.onload = () => img.classList.add('loaded');
        imageObserver.unobserve(img);
      });
    }, { rootMargin: '520px 0px' });
    function escapeHtml(value) {
      return String(value).replace(/[&<>"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
    }
    function renderMainNav() {
      mainNav.innerHTML = mains.map(main => `<button type="button" class="${main === state.main ? 'active' : ''}" data-main="${escapeHtml(main)}">${escapeHtml(main)}</button>`).join('');
      mainNav.querySelectorAll('button').forEach(button => button.addEventListener('click', () => selectMain(button.dataset.main)));
    }
    function selectMain(main) {
      state.main = main;
      const series = [...new Set(portfolioItems.filter(item => item.main === main).map(item => item.series))];
      state.series = series[0] || '';
      renderMainNav();
      renderSeriesTabs();
      renderGallery();
      document.getElementById('gallery').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    function renderSeriesTabs() {
      const series = [...new Set(portfolioItems.filter(item => item.main === state.main).map(item => item.series))];
      seriesTabs.innerHTML = series.map(name => `<button type="button" class="${name === state.series ? 'active' : ''}" data-series="${escapeHtml(name)}">${escapeHtml(name)}</button>`).join('');
      seriesTabs.querySelectorAll('button').forEach(button => button.addEventListener('click', () => { state.series = button.dataset.series; renderSeriesTabs(); renderGallery(); }));
    }
    function renderGallery() {
      const visibleItems = portfolioItems.filter(item => item.main === state.main && item.series === state.series);
      mainTitle.textContent = state.main;
      seriesTitle.textContent = state.series;
      loadNote.textContent = `当前分类 ${visibleItems.length} 张原图，图片滚动到附近时才通过 CDN 请求。`;
      galleryGrid.innerHTML = visibleItems.map(item => `
        <article class="img-card">
          <img src="${placeholder}" data-src="${escapeHtml(item.src)}" alt="${escapeHtml(item.series)} - ${escapeHtml(item.title)}">
          <div class="img-info"><span>${escapeHtml(item.series)}</span><strong>${escapeHtml(item.title)}</strong></div>
        </article>`).join('');
      galleryGrid.querySelectorAll('img').forEach(img => {
        img.addEventListener('click', () => { lightboxImg.src = img.dataset.src; lightboxImg.alt = img.alt; lightbox.classList.add('show'); });
        imageObserver.observe(img);
      });
    }
    document.querySelector('.close').addEventListener('click', () => lightbox.classList.remove('show'));
    lightbox.addEventListener('click', event => { if (event.target === lightbox) lightbox.classList.remove('show'); });
    selectMain(mains[0]);
  </script>
